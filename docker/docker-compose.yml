name: channel-sync-demo

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: channel_sync_app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8100}:80"
    volumes:
      - ..:/var/www/html
      - ../storage:/var/www/html/storage
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      DB_HOST: db
      DB_USERNAME: root
      DB_PASSWORD: root
    depends_on:
      db:
        condition: service_healthy
    networks:
      - channel_sync_network

  db:
    image: mysql:8.0
    container_name: channel_sync_db
    restart: unless-stopped
    ports:
      - "${DB_PORT:-33100}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-channel_sync_db}
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - channel_sync_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - channel_sync_network

volumes:
  channel_sync_db_data:
    name: channel_sync_mysql_data

networks:
  channel_sync_network:
    name: channel_sync_network